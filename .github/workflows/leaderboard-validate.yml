name: Leaderboard Validate
on:
  pull_request:
    paths:
      - 'leaderboard/data/results.json'
      - 'leaderboard/data/citations.json'
      - 'leaderboard/scripts/validate.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install jsonschema
      - run: python leaderboard/scripts/validate.py
